# Copy this file to .github/workflows/quality-gate.yml if the automation token cannot write workflow files.
name: Property logger CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      quality_repeat_count:
        description: "How many times pytest should be repeated. Minimum production gate is 50."
        required: false
        default: "50"
      run_live:
        description: "Append to Notion when true. Requires NOTION_TOKEN and NOTION_PAGE_ID."
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "*/30 * * * *"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      QUALITY_REPEAT_COUNT: ${{ github.event.inputs.quality_repeat_count || '50' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - run: bash scripts/quality_gate.sh
      - uses: actions/upload-artifact@v4
        with:
          name: property-logger-quality-artifacts
          path: |
            out/quality-gate-report.json
            out/dry-run-result.json
            out/facebook-probe-without-token.json
